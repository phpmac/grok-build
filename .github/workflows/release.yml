# 推送 v* tag 时自动构建多平台二进制并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # x86_64 冷缓存 release 构建 + apt 偶发卡顿; 90min 曾在 Install protoc 被吃光
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          # 仅 Apple Silicon (最新 arm mac), 不编 Intel Mac
          - os: macos-14
            target: aarch64-apple-darwin
          # 服务器: Linux x86_64 (Intel/AMD) + Linux aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # 重试: 上次 run 卡在 apt-get 近 90min 导致整 job 超时
          for i in 1 2 3; do
            if sudo -E apt-get update -y \
              && sudo -E apt-get install -y --no-install-recommends \
                protobuf-compiler pkg-config libssl-dev; then
              break
            fi
            echo "apt attempt $i failed; retrying..."
            sleep 10
            if [ "$i" -eq 3 ]; then
              exit 1
            fi
          done
          command -v protoc
          protoc --version
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Rust toolchain
        run: |
          rustup show active-toolchain || true
          rustup target add "${{ matrix.target }}"
          rustc --version
          cargo --version
          protoc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build release
        run: |
          cargo build --release --locked -p xai-grok-pager-bin --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          bin="target/${target}/release/xai-grok-pager"
          test -f "$bin"
          dist="grok-${target}"
          mkdir -p "$dist"
          cp "$bin" "$dist/grok"
          chmod +x "$dist/grok"
          tar -czf "${dist}.tar.gz" "$dist"
          ls -la "${dist}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-${{ matrix.target }}
          path: |
            grok-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find artifacts -type f -name 'grok-*.tar.gz' | sort)
          test "${#files[@]}" -gt 0

          # notes 由发版流程事先写好; 此处仅上传产物, 不覆盖已有说明.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --generate-notes
          fi
