# 推送 v* tag 时自动构建多平台二进制并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler pkg-config libssl-dev
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Rust toolchain
        run: |
          rustup show active-toolchain || true
          rustup target add "${{ matrix.target }}"
          rustc --version
          cargo --version
          protoc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build release
        run: |
          cargo build --release --locked -p xai-grok-pager-bin --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          bin="target/${target}/release/xai-grok-pager"
          test -f "$bin"
          dist="grok-${target}"
          mkdir -p "$dist"
          cp "$bin" "$dist/grok"
          chmod +x "$dist/grok"
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"
          ls -la "${dist}.tar.gz"*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-${{ matrix.target }}
          path: |
            grok-${{ matrix.target }}.tar.gz
            grok-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find artifacts -type f \( -name 'grok-*.tar.gz' -o -name 'grok-*.tar.gz.sha256' \) | sort)
          test "${#files[@]}" -gt 0

          # notes 由发版流程事先写好; 此处仅上传产物, 不覆盖已有说明.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --generate-notes
          fi
